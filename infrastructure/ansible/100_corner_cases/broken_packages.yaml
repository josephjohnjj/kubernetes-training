---
- name: Clean broken Kubernetes APT repositories
  hosts: login
  become: true

  tasks:
    # -----------------------------------------------------
    # Remove ALL possible Kubernetes repo sources
    # -----------------------------------------------------
    - name: Remove Kubernetes deb822 sources file
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/kubernetes.sources
        state: absent

    - name: Remove Kubernetes list files
      ansible.builtin.shell: |
        rm -f /etc/apt/sources.list.d/kubernetes.list
        rm -f /etc/apt/sources.list.d/*kube*
        rm -f /etc/apt/sources.list.d/*pkgs.k8s.io*
        rm -f /etc/apt/sources.list.d/*.sources
      args:
        executable: /bin/bash

    # -----------------------------------------------------
    # Clean system APT cache (prevents stale repo usage)
    # -----------------------------------------------------
    - name: Clean apt cache completely
      ansible.builtin.shell: |
        rm -rf /var/lib/apt/lists/*
        apt-get clean
      args:
        executable: /bin/bash

    # -----------------------------------------------------
    # Refresh base package index (safe state)
    # -----------------------------------------------------
    - name: Update apt cache (base system only)
      ansible.builtin.apt:
        update_cache: true
