---
- name: Install Python packages 
  hosts: all
  become: yes

  vars:
    python_exec: python3
    pip_exec: pip3

    # Set this depending on your CUDA version (or leave empty for CPU fallback)
    cupy_package: "cupy-cuda13x"  

  tasks:

    - name: Ensure pip is installed
      package:
        name: python3-pip
        state: present

    - name: Upgrade pip
      pip:
        name: pip
        executable: "{{ pip_exec }}"
        state: latest

    - name: Install SciPy
      pip:
        name: scipy
        executable: "{{ pip_exec }}"

    - name: Install CuPy (GPU version if specified)
      pip:
        name: "{{ cupy_package }}"
        executable: "{{ pip_exec }}"