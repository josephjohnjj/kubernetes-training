---
- name: Install The Littlest JupyterHub (TLJH)
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    admin_user: ubuntu
    tljh_installed_marker: /opt/tljh/installer/logs

  tasks:

    # -----------------------------------------------------
    # Install TLJH using official bootstrap script
    # -----------------------------------------------------
    - name: Install TLJH via bootstrap script
      shell: |
        curl -L https://tljh.jupyter.org/bootstrap.py | sudo -E python3 - --admin {{ admin_user }}
      args:
        executable: /bin/bash
      register: tljh_install
      changed_when: "'Installing' in tljh_install.stdout or tljh_install.rc == 0"

    # -----------------------------------------------------
    # Ensure JupyterHub service is started
    # -----------------------------------------------------
    - name: Start and enable JupyterHub service
      systemd:
        name: jupyterhub
        state: started
        enabled: yes

    # -----------------------------------------------------
    # Check JupyterHub service status
    # -----------------------------------------------------
    - name: Check JupyterHub status
      command: systemctl status jupyterhub
      register: jupyterhub_status
      changed_when: false

    - name: Display JupyterHub status output
      debug:
        var: jupyterhub_status.stdout_lines

