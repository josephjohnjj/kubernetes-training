---
- name: Install Calico CNI for Kubernetes cluster
  hosts: control[0]
  become: false
  gather_facts: false

  vars:
    calico_version: "v3.27.0"
    calico_manifest_url: "https://raw.githubusercontent.com/projectcalico/calico/{{ calico_version }}/manifests/calico.yaml"
    pod_cidr: "192.168.0.0/16"

  tasks:
    # --------------------------------------------
    # Ensure kubectl is available
    # --------------------------------------------
    - name: Check kubectl exists
      ansible.builtin.command: kubectl version --client
      register: kubectl_check
      changed_when: false

    # --------------------------------------------
    # Download Calico manifest
    # --------------------------------------------
    - name: Download Calico manifest
      ansible.builtin.get_url:
        url: "{{ calico_manifest_url }}"
        dest: /tmp/calico.yaml
        mode: "0644"

    # --------------------------------------------
    # Ensure Pod CIDR is correct in manifest
    # --------------------------------------------
    - name: Ensure Calico CIDR matches cluster Pod CIDR
      ansible.builtin.replace:
        path: /tmp/calico.yaml
        regexp: '192\.168\.0\.0/16'
        replace: "{{ pod_cidr }}"

    # --------------------------------------------
    # Apply Calico manifest (idempotent via kubectl)
    # --------------------------------------------
    - name: Apply Calico CNI
      ansible.builtin.command: kubectl apply -f /tmp/calico.yaml
      register: calico_apply
      changed_when: "'created' in calico_apply.stdout or 'configured' in calico_apply.stdout"

    # --------------------------------------------
    # Wait for Calico pods to be ready
    # --------------------------------------------
    - name: Wait for Calico nodes to be ready
      ansible.builtin.command: >
        kubectl get pods -n kube-system -l k8s-app=calico-node -o jsonpath='{.items[*].status.phase}'
      register: calico_status
      retries: 20
      delay: 10
      until: "'Running' in calico_status.stdout"
      changed_when: false

    # --------------------------------------------
    # Verify all nodes are Ready
    # --------------------------------------------
    - name: Check node status
      ansible.builtin.command: kubectl get nodes
      register: nodes_status
      changed_when: false

    - name: Show node status
      ansible.builtin.debug:
        var: nodes_status.stdout
