---
- name: Configure Kubernetes API Load Balancer on Login Node
  hosts: haproxy
  become: true

  vars:
    k8s_api_port: 6443

  tasks:
    - name: Install HAProxy
      ansible.builtin.apt:
        name: haproxy
        state: present
        update_cache: true

    - name: Backup existing config
      ansible.builtin.copy:
        src: /etc/haproxy/haproxy.cfg
        dest: /etc/haproxy/haproxy.cfg.bak
        remote_src: true
      ignore_errors: true

    - name: Configure HAProxy
      ansible.builtin.copy:
        dest: /etc/haproxy/haproxy.cfg
        mode: "0644"
        content: |
          global
              log /dev/log local0
              log /dev/log local1 notice
              daemon

          defaults
              log global
              mode tcp
              timeout connect 10s
              timeout client  1m
              timeout server  1m
              option tcplog

          frontend k8s_api_frontend
              bind 0.0.0.0:{{ k8s_api_port }}
              default_backend k8s_api_backend

          backend k8s_api_backend
              balance roundrobin
              option tcp-check
              default-server inter 3s fall 3 rise 2
          {% for host in groups['control'] %}
              server {{ host }} {{ hostvars[host]['private_ip'] }}:{{ k8s_api_port }} check
          {% endfor %}

    - name: Enable HAProxy
      ansible.builtin.systemd:
        name: haproxy
        enabled: true
        state: restarted

    - name: Allow API port (UFW)
      ansible.builtin.ufw:
        rule: allow
        port: "{{ k8s_api_port }}"
        proto: tcp
      ignore_errors: true
