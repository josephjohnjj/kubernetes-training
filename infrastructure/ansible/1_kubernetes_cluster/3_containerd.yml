---
- name: Enable CRI in containerd configuration
  hosts: no_login
  become: yes
  gather_facts: yes

  vars:
    containerd_version: "2.2.4-1"

  tasks:
    - name: Install containerd (pinned version)
      ansible.builtin.apt:
        name: "containerd.io={{ containerd_version }}"
        state: present
      tags:
        - containerd
        - install

    - name: Hold containerd package version
      ansible.builtin.dpkg_selections:
        name: containerd.io
        selection: hold
      tags:
        - containerd
        - containerd_hold

    # -----------------------------------------------------
    # Ensure containerd config file exists
    # -----------------------------------------------------
    - name: Check if containerd config exists
      ansible.builtin.stat:
        path: /etc/containerd/config.toml
      register: containerd_config
      tags:
        - containerd
        - config
        - check

    # -----------------------------------------------------
    # If config does not exist, generate default config
    # -----------------------------------------------------
    - name: Generate default containerd config if missing
      ansible.builtin.command: containerd config default
      register: default_config
      changed_when: false
      when: not containerd_config.stat.exists
      tags:
        - containerd
        - config
        - init

    - name: Create containerd config file from default
      ansible.builtin.copy:
        dest: /etc/containerd/config.toml
        content: "{{ default_config.stdout }}"
        mode: "0644"
      when: not containerd_config.stat.exists
      tags:
        - containerd
        - config
        - init

    # -----------------------------------------------------
    # Ensure CRI plugin is NOT disabled
    # -----------------------------------------------------
    - name: Enable CRI plugin in containerd config
      ansible.builtin.replace:
        path: /etc/containerd/config.toml
        regexp: '^disabled_plugins\s*=\s*\[.*"cri".*\]'
        replace: "disabled_plugins = []"
      register: cri_fix
      tags:
        - containerd
        - cri
        - config

    # -----------------------------------------------------
    # Restart containerd only if config changed
    # -----------------------------------------------------
    - name: Restart containerd if CRI was enabled
      ansible.builtin.systemd:
        name: containerd
        state: restarted
      when: cri_fix.changed
      tags:
        - containerd
        - service
        - restart

    # -----------------------------------------------------
    # Ensure containerd is enabled on boot
    # -----------------------------------------------------
    - name: Enable containerd service
      ansible.builtin.systemd:
        name: containerd
        enabled: yes
      tags:
        - containerd
        - service
        - enable
