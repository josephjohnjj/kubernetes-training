---
# ---------------------------------------------------------
# Play 1: System Update + Base Preparation (Ubuntu 22.04)
# ---------------------------------------------------------
- name: Update packages safely on all nodes
  hosts: all
  become: yes
  gather_facts: yes

  tasks:
    - name: Set system hostname
      hostname:
        name: "{{ inventory_hostname }}"
      tags: hostname

    - name: Ensure hostname persists after reboot
      copy:
        dest: /etc/hostname
        content: "{{ inventory_hostname }}\n"
      tags: hostname

    - name: Get node primary IP
      set_fact:
        node_ip: "{{ ansible_default_ipv4.address }}"
      tags: hostname

    - name: Map hostname to IP in /etc/hosts
      lineinfile:
        path: /etc/hosts
        regexp: ".*{{ inventory_hostname }}$"
        line: "{{ node_ip }} {{ inventory_hostname }}"
        state: present
      tags: hostname

    # -----------------------------------------------------
    # APT repair + refresh (IMPORTANT SAFETY STEP)
    # -----------------------------------------------------
    - name: Fix broken packages (safety)
      ansible.builtin.command: apt-get -f install -y
      register: fix_broken
      changed_when: fix_broken.rc == 0
      ignore_errors: yes
      tags: apt_fix

    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
      tags: apt

    - name: Upgrade all packages
      ansible.builtin.apt:
        upgrade: dist
      tags: update

    # -----------------------------------------------------
    # Core system libraries
    # -----------------------------------------------------
    - name: Ensure libc and base tools are up to date
      ansible.builtin.apt:
        name:
          - libc6
          - libc6-dev
        state: latest
      tags: core

    # -----------------------------------------------------
    # Development tools
    # -----------------------------------------------------
    - name: Install build-essential (Development Tools)
      ansible.builtin.apt:
        name: build-essential
        state: present
      tags: devtools

    # -----------------------------------------------------
    # Base system packages
    # -----------------------------------------------------
    - name: Install required system packages
      ansible.builtin.apt:
        name:
          - acl
          - curl
          - git
          - wget
          - htop
          - vim
          - net-tools
          - nano
          - unzip
          - tar
          - lsof
          - dnsutils
          - pciutils
          - xauth
          - apt-transport-https
          - gpg

        state: present
      tags: packages

    # -----------------------------------------------------
    # Additional dev tools
    # -----------------------------------------------------
    - name: Install additional build tools
      ansible.builtin.apt:
        name:
          - python3
          - python3-dev
          - perl
          - autoconf
          - automake
          - gcc
          - g++
          - make
          - cmake
          - ncat
        state: present
      tags: build

    # -----------------------------------------------------
    # Cleanup
    # -----------------------------------------------------
    - name: Remove unused packages
      ansible.builtin.apt:
        autoremove: yes
      tags: cleanup

    - name: Ensure pip is installed
      apt:
        name: python3-pip
        state: present
        update_cache: true
      tags:
        - deps
        - python

    - name: Install Kubernetes Python client dependencies
      pip:
        name:
          - kubernetes
          - openshift
          - pyyaml
        state: present
      tags:
        - deps
        - python
        - kubernetes

    # -----------------------------------------------------
    # Reboot
    # -----------------------------------------------------
    - name: Check if reboot is required
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required

    - name: Reboot nodes if required
      ansible.builtin.reboot:
        reboot_timeout: 600
        test_command: whoami
      when: reboot_required.stat.exists
