- name: Deploy Ceph Block Pool
  hosts: control_primary
  become: true

  vars:
    local_file: "{{ playbook_dir }}/manifest/ceph_blockpool.yaml"
    remote_file: /tmp/ceph_blockpool.yaml

  tasks:
    - name: Copy Block Pool YAML to control plane
      copy:
        src: "{{ local_file }}"
        dest: "{{ remote_file }}"
        mode: "0644"

    - name: Apply Ceph Block Pool
      command: kubectl apply -f {{ remote_file }}

    - name: Verify block pools
      command: kubectl -n rook-ceph get cephblockpool
      register: pods

    - debug:
        var: pods.stdout
