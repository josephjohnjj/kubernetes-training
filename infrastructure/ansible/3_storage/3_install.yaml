---
- name: Setup Rook Ceph via Helm and verify deployment
  hosts: control[0]
  become: false

  vars:
    rook_namespace: rook-ceph
    rook_release_name: rook-ceph
    rook_chart: rook-release/rook-ceph

  tasks:
    - name: Add rook-release Helm repo
      command: >
        helm repo add rook-release https://charts.rook.io/release
      register: repo_add
      changed_when: "'already exists' not in repo_add.stderr"
      tags:
        - helm
        - repo
        - rook
        - setup

    - name: Update Helm repositories
      command: helm repo update
      changed_when: false
      tags:
        - helm
        - repo
        - update

    - name: Create rook-ceph namespace
      kubernetes.core.k8s:
        name: "{{ rook_namespace }}"
        api_version: v1
        kind: Namespace
        state: present
      tags:
        - rook
        - namespace
        - storage
        - setup

    - name: Install or upgrade Rook Ceph via Helm
      command: >
        helm upgrade --install {{ rook_release_name }} {{ rook_chart }}
        --namespace {{ rook_namespace }}
      register: helm_install
      changed_when: "'STATUS: deployed' in helm_install.stdout"
      tags:
        - helm
        - rook
        - install
        - storage

    - name: Wait for Rook Ceph pods to start
      command: kubectl -n {{ rook_namespace }} get pods
      register: rook_pods
      changed_when: false
      retries: 10
      delay: 10
      until: rook_pods.rc == 0
      tags:
        - rook
        - verify
        - pods

    - name: Show Rook Ceph pods
      debug:
        var: rook_pods.stdout_lines
      tags:
        - rook
        - verify
        - debug
